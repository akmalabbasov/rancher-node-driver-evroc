name: Build Rancher Node Driver

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build driver binaries
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOPRIVATE: github.com/akmalabbasov/evroc-sdk
          GONOSUMDB: github.com/akmalabbasov/evroc-sdk
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/rancher-node-driver_${GOOS}_${GOARCH}" ./cmd/rancher-node-driver
          go build -trimpath -o "dist/evroc-machine-driver_${GOOS}_${GOARCH}" ./cmd/evroc-machine-driver
          tar -C dist -czf "dist/rancher-node-driver_${GOOS}_${GOARCH}.tar.gz" "rancher-node-driver_${GOOS}_${GOARCH}"
          tar -C dist -czf "dist/evroc-machine-driver_${GOOS}_${GOARCH}.tar.gz" "evroc-machine-driver_${GOOS}_${GOARCH}"
      - uses: actions/upload-artifact@v4
        with:
          name: rancher-node-driver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rancher-node-driver-*
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
